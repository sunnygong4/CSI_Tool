services:
  web:
    build:
      context: .
      args:
        DNGLAB_DOWNLOAD_URL: ${DNGLAB_DOWNLOAD_URL}
    env_file:
      - .env
    environment:
      CSI_WEB_ENV: production
      CSI_WEB_HOST: 0.0.0.0
      CSI_WEB_PORT: 8080
    ports:
      - "127.0.0.1:${CSI_WEB_HOST_PORT:-6030}:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        DNGLAB_DOWNLOAD_URL: ${DNGLAB_DOWNLOAD_URL}
    command: ["python", "-m", "csi_tool.web.worker"]
    env_file:
      - .env
    environment:
      CSI_WEB_ENV: production
    volumes:
      - ./data:/app/data
    restart: unless-stopped
